<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mex Totò - Portal Holográfico</title>
    <style>
        body { 
            background-color: #000000; 
            color: white; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .menu-container { text-align: center; padding: 20px; }
        .logo { width: 180px; filter: drop-shadow(0 0 10px #00ffff); }
        .btn { 
            display: block; 
            width: 250px; 
            padding: 15px; 
            margin: 10px auto; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .fb { background-color: #1877F2; }
        .tk { background-color: #000000; border: 2px solid #ff0050; }
        .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .wa { background-color: #25D366; }
        
        h2 { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; animation: flicker 2s infinite; }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <img src="https://vvalencia.github.io/mex-toto-live-future/interaccion/logo.png" class="logo" alt="Logo">
        <h2>OK LIVE FUTURE</h2>
        <a href="#" class="btn fb">FACEBOOK</a>
        <a href="#" class="btn tk">TIKTOK</a>
        <a href="#" class="btn ig">INSTAGRAM</a>
        <a href="#" class="btn wa">WHATSAPP</a>
    </div>
</body>
</html>
